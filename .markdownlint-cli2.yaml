# markdownlint-cli2 configuration for awslabs/startups
# Handles SKILL.md and POWER.md files with YAML frontmatter

frontMatter: "^---\\n[\\s\\S]*?\\n---\\n"

gitignore: true

globs:
  - "**/*.md"

ignores:
  - "**/node_modules/**"

config:
  default: true
  MD003:
    style: "atx"
  MD009:
    br_spaces: 2
    list_item_empty_lines: true
  MD010:
    code_blocks: false
  MD013: false
  MD024:
    siblings_only: true
  MD025:
    level: 1
  MD026: false
  MD033:
    allowed_elements:
      - "br"
      - "details"
      - "summary"
      - "kbd"
      - "img"
      - "sub"
      - "sup"
  MD034: false
  MD036: false
  MD040: false
  MD041: false
  MD046:
    style: "fenced"
  MD048:
    style: "backtick"
